site_name: ご利用ガイド
site_description: システムに関するご案内
site_url: https://koenlee1023.github.io/mkdocs-instruction/

theme:
  name: material
  language: ja
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  features:
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.action.edit

plugins:
  - search:
      lang: ja
  - blog:
      blog_dir: information
      post_dir: "{blog}/updates"
      post_date_format: long
      post_url_date_format: yyyy/MM/dd
      post_url_format: "{date}/{slug}"
      archive: true
      archive_name: アーカイブ
      archive_date_format: yyyy
      categories: true
      categories_name: カテゴリー
      categories_allowed:
        - お知らせ
        - 操作ガイド
        - メンテナンス

nav:
  - ホーム: index.md
  - お知らせ:
      - information/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

repo_url: https://github.com/KoenLee1023/mkdocs-instruction
repo_name: KoenLee1023/mkdocs-instruction
edit_uri: edit/main/docs/



